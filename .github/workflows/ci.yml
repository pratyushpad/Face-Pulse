name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: web-app/backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest tests -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-app/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
